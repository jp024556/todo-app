name: Deploy to Statpio
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: export NODE_OPTIONS=--openssl-legacy-provider && npm run build
      - name: Create Build Archive
        run: cd dist/todo-app && zip -r $GITHUB_WORKSPACE/build.zip .
      - name: Get OIDC Token
        id: oidc
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            return await core.getIDToken('statpio')
      - name: Upload to Statpio
        run: |
          curl -X POST -F "file=@build.zip" \
          -H "Authorization: Bearer ${{ steps.oidc.outputs.result }}" \
          https://statpio.com/api/projects/jay/deployments
